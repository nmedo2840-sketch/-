<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>📦 مخزن الإنتاج البحري</title>

<style>
/* 🌈 خلفية متدرجة احترافية */
body{
  font-family:Tahoma;
  margin:0;
  padding:20px;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}

/* 🏷️ العنوان */
h2{
  text-align:center;
  margin-bottom:20px;
  animation: fadeDown 1s ease;
}

/* 🔍 السيرش */
input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
  margin-bottom:20px;
  font-size:16px;
}

/* 📦 الكونتينر */
.container{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
}

/* 🧊 الكارد */
.card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  width:230px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  transition:0.4s;
  animation: popIn 0.5s ease;
}

/* ✨ hover */
.card:hover{
  transform: translateY(-8px) scale(1.03);
  box-shadow:0 15px 30px rgba(0,0,0,0.5);
}

/* 🖼️ الصورة */
.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  cursor:pointer;
  transition:0.4s;
}

.card img:hover{
  transform: scale(1.1);
}

/* 📝 المحتوى */
.card-content{
  padding:10px;
}

.card h4{
  margin:5px 0;
}

/* ✨ أنيميشن */
@keyframes popIn{
  from{opacity:0; transform:scale(0.8);}
  to{opacity:1; transform:scale(1);}
}

@keyframes fadeDown{
  from{opacity:0; transform:translateY(-20px);}
  to{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<h2>📦 مخزن الإنتاج البحري</h2>

<input type="text" id="search" placeholder="🔍 ابحث بالاسم أو اللوكيشن">

<div class="container" id="products">⏳ جاري التحميل...</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyh0czRkVK5fjUoDyWAA0JDi6V2hRBEH4bFlsl3n2GuLTiHYOVZoE1fZYpqVMBKRxt7/exec";

let products = [];

// 🧠 تنظيف النص
function normalize(text){
  return (text || "")
    .replace(/[أإا]/g,"ا")
    .replace(/ة/g,"ه")
    .replace(/ى/g,"ي")
    .toLowerCase();
}

// 📥 تحميل البيانات
fetch(API)
.then(res => res.json())
.then(data=>{
  products = data || [];
  render(products);
})
.catch(()=>{
  document.getElementById("products").innerHTML="❌ فشل تحميل البيانات";
});

// 🎨 عرض
function render(list){

  let html="";

  list.forEach((p,i)=>{
    html += `
    <div class="card" onclick="openDetails(${i})">
      <img src="${p.image || ''}">
      <div class="card-content">
        <h4>${p.name || ''}</h4>
        <p>📍 ${p.location || ''}</p>
        <p>🔢 ${p.code || ''}</p>
        <p>📦 ${p.qty || ''}</p>
      </div>
    </div>`;
  });

  document.getElementById("products").innerHTML = html;
}

// 🔥 تفاصيل
function openDetails(i){
  localStorage.setItem("product", JSON.stringify(products[i]));
  window.location.href = "details.html";
}

// 🔍 سيرش
document.getElementById("search").addEventListener("input",function(){
  let val = normalize(this.value);

  let filtered = products.filter(p =>
    normalize(p.name).includes(val) ||
    normalize(p.location).includes(val)
  );

  render(filtered);
});

</script>

</body>
</html>
