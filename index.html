<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مخزن الإنتاج البحري</title>

<style>
body { font-family:Tahoma; background:#f5f5f5; padding:20px; }

h2 { text-align:center; }

input {
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid #ccc;
}

.card {
  background:#fff;
  padding:10px;
  margin:10px;
  display:inline-block;
  width:220px;
  border-radius:10px;
  box-shadow:0 0 5px #ccc;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.03);
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
  cursor:pointer;
  border-radius:8px;
}
</style>

</head>

<body>

<h2>📦 مخزن الإنتاج البحري</h2>

<input type="text" id="search" placeholder="ابحث بالاسم أو اللوكيشن">

<div id="products">⏳ جاري تحميل البيانات...</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyh0czRkVK5fjUoDyWAA0JDi6V2hRBEH4bFlsl3n2GuLTiHYOVZoE1fZYpqVMBKRxt7/exec";

let products = [];

// 🔥 تنظيف النص (بحث ذكي)
function normalize(text){
  return (text || "")
    .replace(/[أإا]/g, "ا")
    .replace(/ة/g, "ه")
    .replace(/ى/g, "ي")
    .toLowerCase();
}

// 🔥 تحميل البيانات
fetch(API)
.then(res => res.json())
.then(data => {
  products = data || [];
  render(products);
})
.catch(()=>{
  document.getElementById("products").innerHTML="❌ فشل تحميل البيانات";
});

// 🔥 عرض البيانات
function render(list){
  let html = "";

  if(list.length === 0){
    document.getElementById("products").innerHTML = "❌ لا يوجد نتائج";
    return;
  }

  list.forEach((p,i)=>{
    html += `
    <div class="card">
      <img src="${p.image || ''}" onclick="openDetails(${i})">
      <h4>${p.name || ''}</h4>
      <p>📍 ${p.location || ''}</p>
      <p>🔢 ${p.code || ''}</p>
      <p>📦 ${p.qty || ''}</p>
    </div>`;
  });

  document.getElementById("products").innerHTML = html;
}

// 🔥 فتح التفاصيل
function openDetails(i){
  localStorage.setItem("product", JSON.stringify(products[i]));
  window.location.href = "details.html";
}

// 🔥 البحث الذكي
document.getElementById("search").addEventListener("input", function(){
  let value = normalize(this.value);

  let filtered = products.filter(p =>
    normalize(p.name).includes(value) ||
    normalize(p.location).includes(value)
  );

  render(filtered);
});

</script>

</body>
</html>
