<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تفاصيل البند</title>

<style>
body {
  font-family:Tahoma;
  padding:20px;
  background:#f5f5f5;
}
img {
  width:100%;
  max-width:400px;
  border-radius:10px;
}
.box {
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px #ccc;
}
</style>

</head>

<body>

<div class="box" id="details"></div>

<script>

// بنجيب البيانات اللي خزناها
let p = JSON.parse(localStorage.getItem("product"));

// نعرضها
document.getElementById("details").innerHTML = `
  <h2>${p.name}</h2>
  <img src="${p.image}">
  <p>📍 ${p.location}</p>
  <p>🔢 الكود: ${p.code}</p>
  <p>⚖️ الوحدة: ${p.unit}</p>
  <p>📦 الكمية: ${p.qty}</p>
  <p>📝 ${p.desc}</p>
`;

</script>

</body>
</html>
